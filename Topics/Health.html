<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge Movers - Vocabulary Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f7f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            border: 6px solid #bce1cd;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .level-badge {
            font-family: 'Fredoka One', cursive;
            background-color: #ff9f43;
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14pt;
            box-shadow: 0 4px 0 #d35400;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: #555;
        }

        .progress-bar-bg {
            width: 120px;
            height: 14px;
            background-color: #e2ecc8;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ccd9aa;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #2ed573;
            transition: width 0.3s ease;
        }

        /* 隱藏文字提示框 */
        .target-word-box {
            display: none;
        }

        .target-word {
            font-family: 'Fredoka One', cursive;
            font-size: 24pt;
            color: #2c3e50;
            margin: 0;
            letter-spacing: 1px;
        }

        .image-viewport {
            width: 100%;
            height: 240px;
            background-color: #fbfbfc;
            border: 4px solid #dfe6e9;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.02);
            padding: 10px;
            margin-top: 10px;
        }

        .image-viewport img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-option {
            background-color: #ffffff;
            border: 3px solid #dfe6e9;
            border-bottom: 7px solid #dfe6e9;
            border-radius: 16px;
            padding: 14px 20px;
            font-size: 16pt;
            font-weight: 700;
            color: #2d3436;
            cursor: pointer;
            transition: all 0.1s ease;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-option:hover {
            background-color: #f9f9f9;
            border-color: #b2bec3;
        }

        .btn-option:active {
            transform: translateY(4px);
            border-bottom-width: 3px;
        }

        .btn-option.correct {
            background-color: #2ed573 !important;
            border-color: #26af5f !important;
            border-bottom-color: #1b8a47 !important;
            color: white !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }

        .btn-option.wrong {
            background-color: #ff4757 !important;
            border-color: #ff2238 !important;
            border-bottom-color: #b31020 !important;
            color: white !important;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 10;
        }

        .overlay-title {
            font-family: 'Fredoka One', cursive;
            font-size: 28pt;
            color: #ff9f43;
            margin-bottom: 10px;
        }

        .overlay-score {
            font-size: 40pt;
            font-weight: 700;
            color: #2ed573;
            margin-bottom: 30px;
        }

        .btn-restart {
            font-family: 'Fredoka One', cursive;
            background-color: #2ed573;
            color: white;
            border: none;
            border-bottom: 6px solid #1b8a47;
            padding: 14px 40px;
            font-size: 18pt;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(46, 213, 115, 0.3);
            transition: all 0.1s ease;
        }

        .btn-restart:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 4px 8px rgba(46, 213, 115, 0.2);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <span class="level-badge">Movers</span>
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill"></div>
                </div>
                <span id="progressText">1/18</span>
            </div>
        </div>

        <div class="target-word-box">
            <h2 id="targetWord" class="target-word">cold</h2>
        </div>

        <div class="image-viewport" id="imageViewport"></div>

        <div class="options-grid" id="optionsContainer"></div>

        <div class="overlay-screen" id="endScreen">
            <h2 class="overlay-title">Well Done! 🎉</h2>
            <div class="overlay-score" id="finalScore">18 / 18</div>
            <button class="btn-restart" onclick="restartQuiz()">Play Again</button>
        </div>
    </div>

    <script>
        const vocabulary = [
            { word: "cold", options: ["cold", "cough", "tired"] },
            { word: "cough", options: ["cough", "cold", "cry"] },
            { word: "cry", options: ["cry", "tired", "sick"] },
            { word: "earache", options: ["earache", "headache", "toothache"] },
            { word: "fall", options: ["fall", "sick", "toothache"] },
            { word: "headache", options: ["headache", "earache", "stomach-ache"] },
            { word: "hospital", options: ["hospital", "doctor", "nurse"] },
            { word: "fine", options: ["fine", "hospital", "sick"] },
            { word: "stomach-ache", options: ["stomach-ache", "headache", "earache"] },
            { word: "temperature", options: ["temperature", "cold", "cough"] },
            { word: "tired", options: ["tired", "sick", "cry"] },
            { word: "toothache", options: ["toothache", "earache", "headache"] },
            { word: "ill", options: ["ill", "earache", "fine"] },
            { word: "sick", options: ["sick", "doctor", "fine"] },
            { word: "dentist", options: ["dentist", "doctor", "nurse"] },
            { word: "doctor", options: ["doctor", "nurse", "dentist"] },
            { word: "nurse", options: ["nurse", "doctor", "dentist"] },
            { word: "matter", options: ["matter", "fine", "sick"] }
        ];

        let currentIndex = 0;
        let score = 0;
        let hasAnswered = false;

        function getImagePath(word) { return `images/${word}.png`; }

        function loadQuestion() {
            hasAnswered = false;
            const currentItem = vocabulary[currentIndex];
            document.getElementById("progressText").textContent = `${currentIndex + 1} / ${vocabulary.length}`;
            document.getElementById("progressBar").style.width = `${((currentIndex) / vocabulary.length) * 100}%`;
            document.getElementById("targetWord").textContent = currentItem.word;
            const viewport = document.getElementById("imageViewport");
            viewport.innerHTML = `<img src="${getImagePath(currentItem.word)}" alt="${currentItem.word}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\'font-weight:bold;color:#aaa;\'>Image Not Found</div>'">`;
            
            const shuffledOptions = [...currentItem.options].sort(() => Math.random() - 0.5);
            const optionsContainer = document.getElementById("optionsContainer");
            optionsContainer.innerHTML = "";
            shuffledOptions.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedButton, chosenWord) {
            if (hasAnswered) return;
            hasAnswered = true;
            const correctWord = vocabulary[currentIndex].word;
            if (chosenWord === correctWord) {
                selectedButton.classList.add("correct");
                score++;
            } else {
                selectedButton.classList.add("wrong");
                document.querySelectorAll(".btn-option").forEach(btn => {
                    if (btn.textContent === correctWord) btn.classList.add("correct");
                });
            }
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < vocabulary.length) loadQuestion();
                else showEndScreen();
            }, 1500);
        }

        function showEndScreen() {
            document.getElementById("progressBar").style.width = "100%";
            document.getElementById("endScreen").style.display = "flex";
            document.getElementById("finalScore").textContent = `${score} / ${vocabulary.length}`;
        }

        function restartQuiz() {
            currentIndex = 0;
            score = 0;
            document.getElementById("endScreen").style.display = "none";
            vocabulary.sort(() => Math.random() - 0.5);
            loadQuestion();
        }

        window.onload = () => {
            vocabulary.sort(() => Math.random() - 0.5);
            loadQuestion();
        };
    </script>
</body>
</html>
