<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>學習主題清單</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 頁面基本設定 */
        body { font-family: sans-serif; padding: 40px; color: #333; background-color: #fff; }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 表格美化 */
        table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #ddd; color: #666; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; }
        
        /* 連結樣式 */
        a { text-decoration: none; color: #007bff; font-weight: bold; display: block; }
        
        /* 滑鼠懸停效果 */
        tr:hover { background-color: #f9f9f9; }
        tr:hover a { color: #0056b3; }
    </style>
</head>
<body>

    <h2>學習主題清單</h2>
    <table id="topicsTable">
        <thead>
            <tr>
                <th>主題內容</th>
            </tr>
        </thead>
        <tbody>
            <!-- 資料將由 JS 自動生成 -->
        </tbody>
    </table>

    <script>
        $(document).ready(function() {
            // 你的主題資料清單
            const topics = [
                { name: "Health", url: "Topics/Health.html" },
                { name: "Food", url: "Topics/food.html" },
                { name: "Body", url: "Topics/Body.html" },
				 { name: "TheWorldAroundUs", url: "Topics/TheWorldAroundUs.html" }

            ];

            const tableBody = $("#topicsTable tbody");

            $.each(topics, function(index, item) {
                tableBody.append(`
                    <tr>
                        <td><a href="${item.url}">${item.name}</a></td>
                    </tr>
                `);
            });
        });
    </script>
	
	<style>
    /* 頁面基本設定 */
    body { font-family: sans-serif; padding: 40px; color: #333; background-color: #fff; }
    h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; } /* 標題也置中 */
    
    /* 表格美化 */
    table { width: 100%; max-width: 600px; border-collapse: collapse; margin: 20px auto; } /* margin: auto 讓整個表格置中 */
    
    /* 將 th 和 td 的 text-align 改為 center */
    th { text-align: center; padding: 12px; border-bottom: 2px solid #ddd; color: #666; }
    td { padding: 15px 12px; border-bottom: 1px solid #eee; text-align: center; }
    
    /* 連結樣式 */
    a { text-decoration: none; color: #007bff; font-weight: bold; display: block; }
    
    /* 滑鼠懸停效果 */
    tr:hover { background-color: #f9f9f9; }
    tr:hover a { color: #0056b3; }
</style>

</body>
</html>
